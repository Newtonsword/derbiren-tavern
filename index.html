<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德比伦酒馆 · Derbiren Tavern</title>
<style>
:root {
  --bg: #1a1410; --panel: #231e1a; --border: #3a3028; --text: #d4c5b2;
  --dim: #8a7a6a; --accent: #c44b3c; --accent-glow: #e85d4a; --gold: #c9a050;
  --good: #5a9e4b; --input-bg: #1e1914; --msg-user: #2a2520; --msg-gm: #1e1c18;
  --badge: #e85d4a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Microsoft YaHei","PingFang SC",sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; justify-content: center; align-items: center;
}
#app {
  width: 100%; max-width: 750px; height: 100vh;
  display: flex; flex-direction: column; background: var(--panel);
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
}
#topbar {
  display: flex; align-items: center; padding: 0 10px;
  background: #1c1814; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#topbar .logo { font-size: 18px; font-weight: bold; color: var(--accent); margin-right: 14px; }
.tab-btn {
  background: none; border: none; color: var(--dim); font-size: 15px;
  padding: 12px 14px; cursor: pointer; border-bottom: 2px solid transparent;
  transition: .15s; font-family: inherit;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent-glow); border-bottom-color: var(--accent); }
.tab-panel { display: none; flex:1; overflow: hidden; flex-direction: column; }
.tab-panel.active { display: flex; }

#session-bar {
  display: flex; align-items: center; gap: 8px; padding: 5px 14px;
  font-size: 12px; color: var(--dim); background: #1a1612;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#session-bar .sid { font-family: monospace; opacity: .7; }
#session-bar button {
  background: none; border: 1px solid var(--border); color: var(--dim);
  padding: 2px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit;
}
#session-bar button:hover { color: var(--text); border-color: var(--accent); }

/* 冒险 */
#chat-log {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
}
#chat-log::-webkit-scrollbar { width: 6px; }
#chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.msg {
  max-width: 88%; padding: 10px 14px; border-radius: 8px;
  line-height: 1.75; font-size: 14px; white-space: pre-wrap; word-break: break-word;
  animation: fadeIn .25s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
.msg.gm { background: var(--msg-gm); align-self: flex-start; border-left: 3px solid var(--accent); }
.msg.user { background: var(--msg-user); align-self: flex-end; border-right: 2px solid var(--dim); color: #c8bfb0; }
.msg.typing { opacity: .6; font-style: italic; }
.msg.typing::after { content: "▊"; animation: blink .6s infinite; }
@keyframes blink { 50% { opacity: 0; } }
.welcome { text-align: center; color: var(--dim); padding: 32px 16px; font-size: 13px; line-height: 1.8; }
.welcome .big { font-size: 32px; display: block; margin-bottom: 8px; }

#input-area {
  display: flex; padding: 10px 16px; gap: 8px;
  border-top: 1px solid var(--border); background: #1c1814;
}
#input-area input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--input-bg); color: var(--text); font-size: 14px; font-family: inherit; outline: none;
}
#input-area input:focus { border-color: var(--accent); }
#send-btn {
  padding: 10px 20px; background: var(--accent); color: #fff;
  border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: inherit;
}
#send-btn:hover { background: var(--accent-glow); }
#send-btn:disabled { opacity: .4; cursor: not-allowed; }
#dice-btn {
  padding: 10px 12px; background: #2a2520; color: var(--gold);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 16px; cursor: pointer; font-family: inherit;
}
#dice-btn:hover { background: #3a3028; color: #fff; }
.msg.roll { background: #1a1c18; align-self: center; border: 1px solid var(--border);
  font-family: monospace; font-size: 13px; text-align: center; color: var(--gold); }
.msg.roll .big { font-size: 22px; display: block; }

/* 角色面板 */
#chars-panel { padding: 16px 16px 0; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.char-tabs {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.char-tab {
  padding: 6px 12px; border: 1px solid var(--border); border-radius: 5px;
  cursor: pointer; font-size: 13px; color: var(--dim); background: var(--input-bg);
  font-family: inherit; position: relative; transition: .15s;
}
.char-tab:hover { border-color: var(--accent); color: var(--text); }
.char-tab.active { border-color: var(--accent); color: var(--gold); background: #2a2018; }
.char-tab .badge {
  position: absolute; top: -6px; right: -6px;
  background: var(--badge); color: #fff; font-size: 10px; font-weight: bold;
  width: 18px; height: 18px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
}
.char-add-btn {
  padding: 6px 10px; border: 1px dashed var(--border); border-radius: 5px;
  background: none; color: var(--dim); cursor: pointer; font-size: 16px; font-family: inherit;
}
.char-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 属性加点 */
.stats-section { padding: 4px 0; }
.stats-section h3 { font-size: 14px; color: var(--gold); margin-bottom: 8px; }
.free-pts { font-size: 18px; font-weight: bold; color: var(--accent-glow); margin-bottom: 8px; }
.stat-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid rgba(58,48,40,.4);
}
.stat-name { width: 44px; font-weight: bold; font-size: 14px; color: var(--gold); }
.stat-desc { flex: 1; font-size: 11px; color: var(--dim); }
.stat-btn {
  width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--input-bg); color: var(--text); font-size: 15px; cursor: pointer;
  font-family: inherit; line-height: 1;
}
.stat-btn:hover { border-color: var(--accent); }
.stat-btn:disabled { opacity: .25; cursor: not-allowed; }
.stat-btn.plus:hover { background: var(--good); border-color: var(--good); color: #fff; }
.stat-btn.minus:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.stat-val { font-size: 16px; font-weight: bold; width: 24px; text-align: center; }

/* 技能区 */
.skills-section { margin-top: 8px; }
.skills-section h3 { font-size: 14px; color: var(--gold); margin-bottom: 8px; cursor: pointer; user-select: none; }
.skills-section h3 .arrow { font-size: 11px; margin-right: 4px; transition: .2s; display: inline-block; }
.skills-section h3 .arrow.open { transform: rotate(90deg); }
.skill-row {
  border: 1px solid var(--border); border-radius: 5px; margin-bottom: 6px;
  background: var(--input-bg); overflow: hidden;
}
.skill-summary {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  cursor: pointer; user-select: none;
}
.skill-summary:hover { background: #231e1a; }
.skill-summary .s-name { color: var(--gold); font-weight: bold; font-size: 13px; }
.skill-summary .s-type { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #2a2520; color: var(--dim); }
.skill-summary .s-lv { font-size: 10px; color: var(--accent); margin-left: auto; }
.skill-summary .s-arrow { font-size: 10px; color: var(--dim); transition: .2s; }
.skill-summary .s-arrow.open { transform: rotate(90deg); }
.skill-detail {
  display: none; padding: 8px 10px 10px; border-top: 1px solid var(--border);
  font-size: 12px; line-height: 1.7; color: var(--dim);
}
.skill-detail.open { display: block; }
.skill-detail .s-formula { color: var(--gold); font-family: monospace; }
.skill-detail .upgrade-btn {
  margin-top: 6px; padding: 3px 12px; background: var(--accent); color: #fff;
  border: none; border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit;
}
.skill-detail .upgrade-btn:disabled { opacity: .4; cursor: not-allowed; }

/* 被动区 */
.passives-section { margin-top: 4px; }
.passives-section h3 { font-size: 13px; color: var(--dim); margin-bottom: 4px; cursor: pointer; }
.passive-row {
  font-size: 12px; color: var(--dim); padding: 3px 0;
  display: flex; gap: 8px;
}
.passive-row .p-name { color: var(--text); }

/* 等级提升 Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.7); z-index: 100;
  justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  width: 90%; max-width: 520px; max-height: 80vh; overflow-y: auto; padding: 20px;
}
.modal-box h2 { font-size: 18px; color: var(--gold); margin-bottom: 12px; }
.skill-option {
  border: 1px solid var(--border); border-radius: 6px; padding: 12px;
  margin-bottom: 8px; background: var(--input-bg);
  display: flex; flex-direction: column; gap: 8px;
}
.skill-option .so-name { color: var(--gold); font-weight: bold; font-size: 14px; }
.skill-option .so-type { font-size: 11px; color: var(--accent); }
.skill-option .so-desc { font-size: 12px; color: var(--dim); }
.skill-option .so-formula { font-size: 12px; color: var(--gold); font-family: monospace; }
.skill-option .so-meta { font-size: 11px; color: var(--dim); }
.skill-option .pick-btn {
  padding: 6px 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
  align-self: flex-end; font-family: inherit;
}
.skill-option .pick-btn:hover { background: var(--accent-glow); }
.modal-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.modal-actions button {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--input-bg); color: var(--text); cursor: pointer; font-size: 13px; font-family: inherit;
}
.modal-actions button:hover { border-color: var(--accent); }
.modal-actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
#custom-skill-input {
  width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--input-bg); color: var(--text); font-size: 13px; font-family: inherit;
  margin-top: 8px; resize: vertical; min-height: 60px;
}

/* 设置 */
#settings-panel { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
#settings-panel h2 { font-size: 16px; color: var(--gold); margin-bottom: 4px; }
.setting-group { display: flex; flex-direction: column; gap: 6px; }
.setting-group label { font-size: 13px; color: var(--dim); }
.setting-group input {
  padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--input-bg); color: var(--text); font-size: 14px; font-family: inherit; outline: none;
}
.setting-group input:focus { border-color: var(--accent); }
.setting-group .hint { font-size: 11px; color: var(--dim); }
#save-settings-btn {
  padding: 10px 28px; background: var(--accent); color: #fff;
  border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: inherit;
}
#save-settings-btn:hover { background: var(--accent-glow); }
#settings-status { font-size: 13px; min-height: 20px; }
#settings-status.ok { color: var(--good); }
#settings-status.err { color: var(--accent); }

/* 战斗日志 */
.log-entry {
  border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg);
  padding: 10px 14px; font-size: 13px;
}
.log-entry .log-type {
  display: inline-block; padding: 1px 8px; border-radius: 3px;
  font-size: 10px; font-weight: bold; margin-right: 8px;
}
.log-type.roll { background: #2a2520; color: var(--gold); }
.log-type.damage { background: #3a1818; color: var(--accent); }
.log-type.event { background: #1a2a1a; color: var(--good); }
.log-entry .log-main { line-height: 1.8; color: var(--text); }
.log-entry .log-detail { font-size: 11px; color: var(--dim); margin-top: 4px; font-family: monospace; }
.log-entry .log-narr { font-size: 11px; color: var(--dim); margin-top: 2px; font-style: italic; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="logo">🔥 德比伦酒馆</span>
    <button class="tab-btn active" data-tab="adventure">🗡️ 冒险</button>
    <button class="tab-btn" data-tab="chars">👥 角色</button>
    <button class="tab-btn" data-tab="log">📊 日志</button>
    <button class="tab-btn" data-tab="settings">⚙️ 设置</button>
  </div>
  <div id="session-bar">
    <span>SID: <span class="sid" id="sid-display">---</span></span>
    <button onclick="newAdventure()">新冒险</button>
  </div>

  <!-- 冒险 -->
  <div class="tab-panel active" id="tab-adventure">
    <div id="chat-log">
      <div class="welcome">
        <span class="big">🔥</span>
        德比伦翘着尾巴斜眼看着你推门进来。<br>
        <em>「哼，又来一个杂鱼冒险者。」</em><br><br>
        输入行动，开始冒险。
      </div>
    </div>
    <div id="input-area">
      <input id="user-input" placeholder="描述你的行动——推开沉重的橡木门，走进昏暗的酒馆..." autofocus>
      <button id="dice-btn" onclick="quickRoll()" title="快捷掷骰">🎲</button>
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- 角色 -->
  <div class="tab-panel" id="tab-chars">
    <div id="chars-panel">
      <div id="char-tabs-row" class="char-tabs"></div>
      <div id="char-stats-area"></div>
      <div id="char-skills-area"></div>
      <div id="char-passives-area"></div>
    </div>
  </div>

  <!-- 战斗日志 -->
  <div class="tab-panel" id="tab-log">
    <div id="log-panel" style="padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 style="font-size:16px;color:var(--gold);">📊 数值判定日志</h2>
        <button onclick="refreshLog()" style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--input-bg);color:var(--dim);cursor:pointer;font-size:12px;font-family:inherit;">🔄 刷新</button>
      </div>
      <div id="log-entries" style="font-size:13px;color:var(--dim);text-align:center;padding:24px;">冒险开始后，所有骰子和战斗计算会显示在这里。</div>
    </div>
  </div>

  <!-- 设置 -->
  <div class="tab-panel" id="tab-settings">
    <div id="settings-panel">
      <h2>⚙️ API 设置</h2>
      <div class="setting-group">
        <label>API Key</label>
        <input id="set-key" type="password" placeholder="sk-...">
        <span class="hint">支持 DeepSeek / OpenAI 等兼容格式</span>
      </div>
      <div class="setting-group">
        <label>Base URL</label>
        <input id="set-base" placeholder="https://api.deepseek.com">
      </div>
      <div class="setting-group">
        <label>模型名</label>
        <input id="set-model" placeholder="deepseek-chat">
      </div>
      <button id="save-settings-btn" onclick="saveSettings()">💾 保存</button>
      <div id="settings-status"></div>
      <h2 style="margin-top:16px;">🌍 世界观</h2>
      <div class="setting-group">
        <label>自定义世界设定（影响 GM 叙事风格）</label>
        <textarea id="set-world" style="padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--text);font-size:14px;font-family:inherit;resize:vertical;min-height:60px;">中世纪奇幻地下城。玩家从冒险者公会大厅开始。</textarea>
      </div>
      <button id="save-world-btn" onclick="saveWorld()" style="padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;">💾 保存世界观</button>
      <div id="world-status" style="font-size:13px;min-height:20px;"></div>
    </div>
  </div>

  <!-- 创建冒险 Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal-box">
      <h2>🔥 开始新冒险</h2>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;color:var(--dim);">🌍 世界观设定</label>
        <textarea id="create-world" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:13px;font-family:inherit;resize:vertical;min-height:60px;margin-top:4px;">中世纪奇幻地下城。玩家从冒险者公会大厅开始。</textarea>
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;color:var(--dim);">👤 你的角色</label>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <input id="create-name" placeholder="角色名" value="冒险者" style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:13px;font-family:inherit;">
          <select id="create-species" onchange="onSpeciesChange()" style="padding:8px 12px;border:1px solid var(--border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:13px;font-family:inherit;">
          </select>
        </div>
        <div id="create-species-info" style="font-size:11px;color:var(--dim);margin-top:4px;"></div>
      </div>
      <div style="margin-bottom:12px;">
        <label style="font-size:13px;color:var(--dim);cursor:pointer;user-select:none;" onclick="var el=document.getElementById('preset-list');el.style.display=el.style.display==='none'?'flex':'none'">📚 角色库 <span style="font-size:10px;">(点击展开，选预设角色)</span></label>
        <div id="preset-list" style="display:none;flex-wrap:wrap;gap:6px;margin-top:6px;"></div>
      </div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:12px;">
        初始七属性各3，自由点数21。可在冒险中随时加点。
      </div>
      <div style="display:flex;gap:8px;">
        <button class="primary" onclick="createAdventure()" style="padding:8px 24px;background:var(--accent);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:14px;font-family:inherit;">开始冒险</button>
        <button onclick="closeCreateModal()" style="padding:8px 16px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--dim);cursor:pointer;font-size:13px;font-family:inherit;">取消</button>
      </div>
    </div>
  </div>

  <!-- 等级提升 Modal -->
  <div class="modal-overlay" id="skill-modal">
    <div class="modal-box">
      <h2>🎉 获得技能点！</h2>
      <div id="modal-title" style="font-size:13px;color:var(--dim);margin-bottom:12px;"></div>
      <div id="modal-skills"></div>
      <div id="modal-actions" class="modal-actions">
        <button onclick="refreshSkills()">🔄 换一批</button>
        <button onclick="showCustomSkill()">✏️ 自定义技能</button>
        <button onclick="closeSkillModal()">关闭</button>
      </div>
      <textarea id="custom-skill-input" style="display:none;" placeholder="描述你想要的技能，德比伦会帮你转成标准格式...&#10;例：一个快速的二连斩，每次伤害不高但能打断施法"></textarea>
      <div class="modal-actions" id="custom-actions" style="display:none;">
        <button class="primary" onclick="submitCustomSkill()">生成技能</button>
        <button onclick="hideCustomInput()">取消</button>
      </div>
    </div>
  </div>
</div>

<script>
const ATTRS = [
  {key:"END", name:"耐力", desc:"体魄与持久力——决定你能扛多少伤害、战斗多久不倒下"},
  {key:"STR", name:"力量", desc:"纯粹的肌肉爆发力——挥砍越重、破甲越狠"},
  {key:"SPD", name:"速度", desc:"身法与反应——先手出击、闪避致命一击、缩短攻击间隔"},
  {key:"DEF", name:"防御", desc:"护甲与格挡技巧——让敌人的攻击打折扣"},
  {key:"INT", name:"法强", desc:"法术天赋与精神力——决定法术的威力与精神攻击的穿透力"},
  {key:"MP",  name:"法量", desc:"魔力池的深度——存储和恢复魔力的能力，决定你能施放多少法术"},
  {key:"WIL", name:"精神", desc:"战斗意志与士气的体现——崩溃线高低、对恐惧和魅惑的抵抗力"},
];

let state = {
  session_id: '',
  characters: [],
  active_char_id: '',
  isLoading: false,
  modal_char_id: '',
};

// ── 初始化 ──
async function init() {
  try {
    const res = await fetch('/api/settings');
    const s = await res.json();
    document.getElementById('set-base').value = s.base_url || '';
    document.getElementById('set-model').value = s.model || '';
    document.getElementById('set-key').placeholder = s.has_key ? '(已设置)' : 'sk-...';
  } catch(e) {}
  await loadOrCreateSession();
}

async function loadOrCreateSession() {
  const saved = localStorage.getItem('derbiren_sid');
  if (saved) {
    try {
      const res = await fetch('/api/session/' + saved);
      if (res.ok) {
        const data = await res.json();
        state.session_id = data.session_id;
        state.characters = data.characters || [];
        state.active_char_id = data.active_char_id || (state.characters[0]?.id || '');
        document.getElementById('sid-display').textContent = state.session_id;
        setWorldField(data.world_setting);
        renderAll();
        restoreHistory(data.history || []);
        return;
      }
    } catch(e) {}
  }
  await newAdventure();
}

async function newAdventure() {
  // 显示创建 Modal
  document.getElementById('create-modal').classList.add('show');
  // 填充物种下拉
  const sel = document.getElementById('create-species');
  sel.innerHTML = SPECIES_PRESETS.map(s => `<option value="${s.name}" data-coeff="${s.coeff}">${s.name}</option>`).join('');
  onSpeciesChange();
  // 渲染角色库
  renderPresets();
}

function renderPresets() {
  const list = document.getElementById('preset-list');
  list.innerHTML = CHARACTER_PRESETS.map((p,i) => {
    const statStr = Object.entries(p.stats).map(([k,v]) => `<span style="color:var(--gold);">${k}:${v}</span>`).join(' ');
    return `<div onclick="selectPreset(${i})" style="cursor:pointer;border:1px solid var(--border);border-radius:5px;padding:6px 10px;background:var(--input-bg);font-size:11px;line-height:1.5;transition:.15s;"
      onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-weight:bold;color:var(--gold);">${p.name}</div>
      <div style="color:var(--dim);">${p.desc}</div>
      <div style="margin-top:2px;">${statStr}</div>
    </div>`;
  }).join('');
}

function selectPreset(idx) {
  const p = CHARACTER_PRESETS[idx];
  document.getElementById('create-name').value = p.name;
  const sel = document.getElementById('create-species');
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === p.species) { sel.selectedIndex = i; break; }
  }
  onSpeciesChange();
  // 存选中的预设数据
  document.getElementById('create-name').dataset.preset = JSON.stringify(p.stats);
}

function onSpeciesChange() {
  const sel = document.getElementById('create-species');
  const opt = sel.options[sel.selectedIndex];
  const coeff = parseFloat(opt.dataset.coeff || 1.3);
  const preset = SPECIES_PRESETS.find(s => s.name === opt.value);
  document.getElementById('create-species-info').textContent = preset ? preset.desc : '';
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.remove('show');
}

async function createAdventure() {
  const world = document.getElementById('create-world').value.trim() || '中世纪奇幻地下城。';
  const name = document.getElementById('create-name').value.trim() || '冒险者';
  const sel = document.getElementById('create-species');
  const opt = sel.options[sel.selectedIndex];
  const species = opt.value;
  const coeff = parseFloat(opt.dataset.coeff || 1.3);
  // 读取预设属性
  let charStats = null;
  try { charStats = JSON.parse(document.getElementById('create-name').dataset.preset || 'null'); } catch(e) {}

  document.getElementById('create-modal').classList.remove('show');

  const body = {world_setting: world, char_name: name, char_species: species, char_coeff: coeff};
  if (charStats) body.char_stats = charStats;

  const res = await fetch('/api/session/new', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  const data = await res.json();
  state.session_id = data.session_id;
  state.characters = data.characters || [];
  state.active_char_id = data.active_char_id || (state.characters[0]?.id || '');
  localStorage.setItem('derbiren_sid', state.session_id);
  document.getElementById('sid-display').textContent = state.session_id;
  document.getElementById('chat-log').innerHTML =
    `<div class="welcome"><span class="big">🔥</span>德比伦翘着尾巴斜眼看着你推门进来。<br><em>「哼，又来一个杂鱼冒险者——${name}，${species}？行吧，本大爷勉为其难当你的GM。」</em><br><br>输入行动，开始冒险。</div>`;
  renderAll();
}

function restoreHistory(history) {
  const log = document.getElementById('chat-log');
  log.innerHTML = '';
  for (const m of history) addMsg(m.role === 'user' ? 'user' : 'gm', m.content);
  scrollBottom();
}

async function refreshCharacters() {
  try {
    const res = await fetch('/api/session/' + state.session_id + '/characters');
    if (res.ok) {
      const data = await res.json();
      state.characters = data.characters || [];
      state.active_char_id = data.active_char_id || (state.characters[0]?.id || '');
      renderAll();
    }
  } catch(e) {}
}

// ── Tab 切换 ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'log') refreshLog();
  });
});

// ── 冒险 ──
function addMsg(cls, text) {
  const log = document.getElementById('chat-log');
  const w = log.querySelector('.welcome'); if (w) w.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  log.appendChild(div);
}
function scrollBottom() {
  document.getElementById('chat-log').scrollTop = document.getElementById('chat-log').scrollHeight;
}

async function sendMessage() {
  if (state.isLoading) return;
  const input = document.getElementById('user-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  if (/^\/r\s/.test(msg)) {
    const dice = msg.replace(/^\/r\s*/, '');
    await doDiceRoll(dice);
    return;
  }

  state.isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addMsg('user', msg);
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg gm typing';
  typingDiv.textContent = '德比伦正在翻看剧本';
  document.getElementById('chat-log').appendChild(typingDiv);
  scrollBottom();

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:msg, session_id:state.session_id}),
    });
    const data = await res.json();
    typingDiv.remove();
    addMsg('gm', data.narrative);
    scrollBottom();
    if (data.session_id && data.session_id !== state.session_id) {
      state.session_id = data.session_id;
      localStorage.setItem('derbiren_sid', state.session_id);
      document.getElementById('sid-display').textContent = state.session_id;
    }
    if (data.characters_updated) {
      await refreshCharacters();
    }
    // 如果当前在日志tab，自动刷新
    if (document.getElementById('tab-log').classList.contains('active')) refreshLog();
  } catch(e) {
    typingDiv.remove();
    addMsg('gm', '🔥💢 连接切断！检查 API 设置吧杂鱼！(' + e.message + ')');
    scrollBottom();
  }
  state.isLoading = false;
  document.getElementById('send-btn').disabled = false;
}
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// ── 角色面板 ──
function renderAll() {
  renderCharTabs();
  renderCharDetail();
}

function renderCharTabs() {
  const row = document.getElementById('char-tabs-row');
  const parts = state.characters.map(c => {
    const active = c.id === state.active_char_id ? ' active' : '';
    const badge = c.pending_skill_points > 0 ? `<span class="badge">${c.pending_skill_points}</span>` : '';
    return `<button class="char-tab${active}" onclick="selectChar('${c.id}')">${c.name} Lv.${c.level}${badge}</button>`;
  }).join('');
  row.innerHTML = parts + `<button class="char-add-btn" onclick="addCharManually()" title="手动添加角色">+</button>`;
}

function selectChar(cid) {
  state.active_char_id = cid;
  // 同步到后端
  fetch('/api/session/' + state.session_id + '/characters/' + cid, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({active: true}),
  }).catch(() => {});
  renderAll();
  // 检查是否有待选技能
  const c = state.characters.find(x => x.id === cid);
  if (c && c.pending_skill_points > 0) openSkillModal(c);
}

function getActiveChar() {
  return state.characters.find(c => c.id === state.active_char_id)
      || state.characters[0];
}

async function addCharManually() {
  const name = prompt('角色名：');
  if (!name) return;
  const species = prompt('物种（默认人类）：', '人类') || '人类';
  try {
    const res = await fetch('/api/session/' + state.session_id + '/characters', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, species}),
    });
    if (res.ok) await refreshCharacters();
  } catch(e) { alert('添加失败: ' + e.message); }
}

function renderCharDetail() {
  const c = getActiveChar();
  if (!c) return;

  // 属性
  const statsArea = document.getElementById('char-stats-area');
  statsArea.innerHTML = `
    <div class="stats-section">
      <h3>🔮 ${c.name} · ${c.species} · Lv.${c.level}</h3>
      <div class="free-pts">剩余点数：<span id="free-pts">${c.free_points}</span></div>
      ${ATTRS.map(({key, name, desc}) => {
        const val = c.stats[key] || 3;
        return `<div class="stat-row">
          <span class="stat-name">${name}</span>
          <span class="stat-desc">${desc}</span>
          <button class="stat-btn minus" onclick="adjustStat('${key}',-1)" ${val<=0?'disabled':''}>−</button>
          <span class="stat-val">${val}</span>
          <button class="stat-btn plus" onclick="adjustStat('${key}',1)" ${c.free_points<=0?'disabled':''}>+</button>
        </div>`;
      }).join('')}
    </div>`;

  // 技能
  const skArea = document.getElementById('char-skills-area');
  const skCollapsed = localStorage.getItem('skills_collapsed_' + c.id) === '1';
  skArea.innerHTML = `
    <div class="skills-section">
      <h3 onclick="toggleSkills('${c.id}')">
        <span class="arrow${skCollapsed ? '' : ' open'}" id="sk-arrow-${c.id}">▶</span>
        ⚔️ 技能 (${c.skills ? c.skills.length : 0})
        ${c.pending_skill_points > 0 ? `<span style="color:var(--accent);font-size:12px;"> — ${c.pending_skill_points}技能点可用</span>` : ''}
      </h3>
      <div id="sk-list-${c.id}" style="${skCollapsed ? 'display:none' : ''}">
        ${(c.skills || []).map(sk => {
          const expanded = localStorage.getItem('skill_expanded_' + sk.id) === '1';
          const typeColors = {斩击:'#c9a050', 刺击:'#5a9e4b', 钝击:'#c44b3c', 精神:'#8b5cf6', 法术:'#4b9eef'};
          return `<div class="skill-row">
            <div class="skill-summary" onclick="toggleSkillDetail('${sk.id}')">
              <span class="s-arrow${expanded ? ' open' : ''}" id="sk-det-arrow-${sk.id}">▶</span>
              <span class="s-name">${sk.name}</span>
              <span class="s-type" style="color:${typeColors[sk.type]||'#8a7a6a'}">${sk.type}</span>
              <span class="s-lv">Lv.${sk.level}/${sk.max_level}</span>
            </div>
            <div class="skill-detail${expanded ? ' open' : ''}" id="sk-det-${sk.id}">
              <div>📝 ${sk.description || '无描述'}</div>
              <div>📐 <span class="s-formula">${sk.formula}</span></div>
              <div>💰 ${sk.cost} | ⏱ ${sk.interval}${sk.special ? ` | ✨ ${sk.special}` : ''}</div>
              ${(c.pending_skill_points > 0 && sk.level < sk.max_level)
                ? `<button class="upgrade-btn" onclick="upgradeSkill('${sk.id}')">⬆ 升级到 Lv.${sk.level+1}</button>`
                : ''}
            </div>
          </div>`;
        }).join('')}
        ${c.pending_skill_points > 0
          ? `<button style="margin-top:8px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;" onclick="openSkillModal(getActiveChar())">✨ 选择新技能</button>`
          : ''}
      </div>
    </div>`;

  // 被动
  const paArea = document.getElementById('char-passives-area');
  if (c.passives && c.passives.length > 0) {
    const paCollapsed = localStorage.getItem('passives_collapsed_' + c.id) === '1';
    paArea.innerHTML = `
      <div class="passives-section">
        <h3 onclick="togglePassives('${c.id}')">
          <span class="arrow${paCollapsed ? '' : ' open'}" id="pa-arrow-${c.id}">▶</span>
          📜 被动
        </h3>
        <div id="pa-list-${c.id}" style="${paCollapsed ? 'display:none' : ''}">
          ${c.passives.map(p => `<div class="passive-row"><span class="p-name">${p.name}</span> ${p.description}</div>`).join('')}
        </div>
      </div>`;
  } else {
    paArea.innerHTML = '';
  }
}

function toggleSkills(cid) {
  const list = document.getElementById('sk-list-' + cid);
  const arrow = document.getElementById('sk-arrow-' + cid);
  const collapsed = list.style.display === 'none';
  list.style.display = collapsed ? '' : 'none';
  arrow.classList.toggle('open', collapsed);
  localStorage.setItem('skills_collapsed_' + cid, collapsed ? '0' : '1');
}

function toggleSkillDetail(skid) {
  const det = document.getElementById('sk-det-' + skid);
  const arrow = document.getElementById('sk-det-arrow-' + skid);
  const expanded = !det.classList.contains('open');
  det.classList.toggle('open', expanded);
  arrow.classList.toggle('open', expanded);
  localStorage.setItem('skill_expanded_' + skid, expanded ? '1' : '0');
}

function togglePassives(cid) {
  const list = document.getElementById('pa-list-' + cid);
  const arrow = document.getElementById('pa-arrow-' + cid);
  const collapsed = list.style.display === 'none';
  list.style.display = collapsed ? '' : 'none';
  arrow.classList.toggle('open', collapsed);
  localStorage.setItem('passives_collapsed_' + cid, collapsed ? '0' : '1');
}

async function adjustStat(key, delta) {
  const c = getActiveChar();
  if (!c) return;
  const newVal = (c.stats[key] || 3) + delta;
  if (newVal < 0 || newVal > 99) return;
  if (delta > 0 && c.free_points <= 0) return;
  c.stats[key] = newVal;
  c.free_points -= delta;
  renderCharDetail();
  try {
    await fetch('/api/session/' + state.session_id + '/characters/' + c.id, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({stats: c.stats, free_points: c.free_points}),
    });
  } catch(e) {}
}

// ── 技能 Modal ──
function openSkillModal(char) {
  state.modal_char_id = char.id;
  document.getElementById('modal-title').textContent =
    `${char.name} Lv.${char.level} | 可用技能点：${char.pending_skill_points}`;
  document.getElementById('skill-modal').classList.add('show');
  loadSkillOptions();
}

function closeSkillModal() {
  document.getElementById('skill-modal').classList.remove('show');
  state.modal_char_id = '';
  hideCustomInput();
}

async function loadSkillOptions() {
  const container = document.getElementById('modal-skills');
  container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--dim);">德比伦正在编技能...</div>';
  try {
    const res = await fetch(
      '/api/session/' + state.session_id + '/characters/' + state.modal_char_id + '/skills/generate',
      { method: 'POST' }
    );
    const data = await res.json();
    const skills = data.skills || [];
    container.innerHTML = skills.map(sk => `
      <div class="skill-option">
        <div class="so-name">${sk.name} <span class="so-type">${sk.type}</span></div>
        <div class="so-desc">${sk.description || ''}</div>
        <div class="so-formula">${sk.formula}</div>
        <div class="so-meta">💰 ${sk.cost} | ⏱ ${sk.interval}${sk.special ? ` | ✨ ${sk.special}` : ''}</div>
        <button class="pick-btn" onclick='pickSkill(${JSON.stringify(sk).replace(/'/g,"&#39;")})'>选择</button>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = '<div style="color:var(--accent);">加载失败：' + e.message + '</div>';
  }
}

async function refreshSkills() { await loadSkillOptions(); }

async function pickSkill(skill) {
  try {
    const res = await fetch(
      '/api/session/' + state.session_id + '/characters/' + state.modal_char_id + '/skills',
      {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({skill}),
      }
    );
    if (res.ok) {
      await refreshCharacters();
      const c = state.characters.find(x => x.id === state.modal_char_id);
      if (c && c.pending_skill_points > 0) {
        document.getElementById('modal-title').textContent =
          `${c.name} Lv.${c.level} | 可用技能点：${c.pending_skill_points}`;
        await loadSkillOptions();
        renderCharDetail();
      } else {
        closeSkillModal();
      }
    } else {
      const err = await res.json();
      alert(err.detail || '添加失败');
    }
  } catch(e) { alert('错误：' + e.message); }
}

function showCustomSkill() {
  document.getElementById('custom-skill-input').style.display = '';
  document.getElementById('custom-actions').style.display = 'flex';
  document.getElementById('modal-actions').style.display = 'none';
  document.getElementById('modal-skills').style.display = 'none';
}

function hideCustomInput() {
  document.getElementById('custom-skill-input').style.display = 'none';
  document.getElementById('custom-actions').style.display = 'none';
  document.getElementById('modal-actions').style.display = 'flex';
  document.getElementById('modal-skills').style.display = '';
}

async function submitCustomSkill() {
  const desc = document.getElementById('custom-skill-input').value.trim();
  if (!desc) return;
  const container = document.getElementById('modal-skills');
  container.style.display = '';
  container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--dim);">德比伦正在解读你的描述...</div>';
  hideCustomInput();
  try {
    const res = await fetch(
      '/api/session/' + state.session_id + '/characters/' + state.modal_char_id + '/skills/custom',
      {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({description: desc}),
      }
    );
    if (res.ok) {
      const data = await res.json();
      // 直接添加
      await fetch(
        '/api/session/' + state.session_id + '/characters/' + state.modal_char_id + '/skills',
        {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({skill: data.skill}),
        }
      );
      await refreshCharacters();
      const c = state.characters.find(x => x.id === state.modal_char_id);
      if (c && c.pending_skill_points > 0) {
        document.getElementById('modal-title').textContent =
          `${c.name} Lv.${c.level} | 可用技能点：${c.pending_skill_points}`;
        await loadSkillOptions();
      } else {
        closeSkillModal();
      }
    } else {
      const err = await res.json();
      container.innerHTML = '<div style="color:var(--accent);padding:10px;">生成失败：' + (err.detail || '未知错误') + '</div>';
    }
  } catch(e) {
    container.innerHTML = '<div style="color:var(--accent);padding:10px;">错误：' + e.message + '</div>';
  }
}

async function upgradeSkill(skid) {
  const c = getActiveChar();
  if (!c || c.pending_skill_points <= 0) return;
  try {
    const res = await fetch(
      '/api/session/' + state.session_id + '/characters/' + c.id + '/skills/' + skid,
      { method:'PUT' }
    );
    if (res.ok) {
      await refreshCharacters();
    } else {
      const err = await res.json();
      alert(err.detail || '升级失败');
    }
  } catch(e) { alert('错误：' + e.message); }
}

// ── 骰子 ──
function addRollMsg(detail, result) {
  const log = document.getElementById('chat-log');
  const w = log.querySelector('.welcome'); if (w) w.remove();
  const div = document.createElement('div');
  div.className = 'msg roll';
  div.innerHTML = `${detail}<br><span class="big">${result}</span>`;
  log.appendChild(div);
  scrollBottom();
}

async function doDiceRoll(diceExpr) {
  try {
    const res = await fetch('/api/roll', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: diceExpr, session_id: state.session_id}),
    });
    const data = await res.json();
    if (data.result && data.result.startsWith('格式错误')) {
      addMsg('gm', '🎲 ' + data.result);
    } else {
      addRollMsg(data.detail, data.result);
    }
  } catch(e) {
    addMsg('gm', '🎲 骰子崩了: ' + e.message);
  }
}

function quickRoll() {
  const input = document.getElementById('user-input');
  const current = input.value.trim();
  if (current) {
    input.value = '/r ' + current;
    sendMessage();
  } else {
    input.value = '/r 3d6';
    sendMessage();
  }
  input.value = '';
}

// ── 设置 ──
async function saveSettings() {
  const key = document.getElementById('set-key').value.trim();
  const base = document.getElementById('set-base').value.trim();
  const model = document.getElementById('set-model').value.trim();
  const status = document.getElementById('settings-status');
  try {
    const res = await fetch('/api/settings', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({api_key:key, base_url:base, model:model}),
    });
    if (res.ok) {
      status.textContent = '✅ 保存成功';
      status.className = 'ok';
      document.getElementById('set-key').value = '';
      document.getElementById('set-key').placeholder = '(已设置)';
    } else {
      status.textContent = '❌ 保存失败';
      status.className = 'err';
    }
  } catch(e) {
    status.textContent = '❌ 网络错误: ' + e.message;
    status.className = 'err';
  }
}

async function saveWorld() {
  if (!state.session_id) return;
  const world = document.getElementById('set-world').value.trim();
  const status = document.getElementById('world-status');
  try {
    const res = await fetch('/api/session/' + state.session_id + '/world', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({world_setting: world}),
    });
    if (res.ok) {
      status.textContent = '✅ 世界观已更新（下次对话生效）';
      status.className = 'ok';
    } else {
      status.textContent = '❌ 保存失败';
      status.className = 'err';
    }
  } catch(e) {
    status.textContent = '❌ 网络错误: ' + e.message;
    status.className = 'err';
  }
}

function setWorldField(val) {
  document.getElementById('set-world').value = val || '中世纪奇幻地下城。玩家从冒险者公会大厅开始。';
}

// ── 战斗日志解析 ──

function refreshLog() {
  const log = document.getElementById('chat-log');
  const entries = document.getElementById('log-entries');
  const msgs = log.querySelectorAll('.msg.gm');
  if (!msgs.length) {
    entries.innerHTML = '<div style="text-align:center;padding:24px;color:var(--dim);">暂无日志——先去冒险吧！</div>';
    return;
  }

  let items = [];
  msgs.forEach(msg => {
    const text = msg.textContent || '';

    // 提取 DMG 块（精确格式）
    const dmgBlocks = text.match(/\[DMG:[^\]]+\]/g);
    if (dmgBlocks) {
      dmgBlocks.forEach(block => {
        const inner = block.replace(/^\[DMG:\s*|\]$/g, '');
        // 提取关键数值
        const rawMatch = inner.match(/原始伤害[=＝](\d+)/);
        const finalMatch = inner.match(/最终伤害[=＝](\d+)/);
        const spiritMatch = inner.match(/精神伤害[=＝](\d+)/);
        const formulaMatch = inner.match(/公式[=＝]([^|]+)/);
        const reduceMatch = inner.match(/护甲减伤[=＝]([\d.]+%)/);
        const remainMatch = inner.match(/剩余(\d+)/);

        let main = '';
        if (rawMatch) main = `造成 ${rawMatch[1]} 点伤害`;
        if (spiritMatch) main = `造成 ${spiritMatch[1]} 点精神伤害`;
        if (finalMatch) main += ` → 实际 ${finalMatch[1]}`;
        if (remainMatch) main += ` (剩余 ${remainMatch[1]})`;

        let detail = [];
        if (formulaMatch) detail.push(formulaMatch[1].trim());
        if (reduceMatch) detail.push(`护甲减伤 ${reduceMatch[1]}`);

        items.push({type:'damage', main: main || inner.substring(0,60), detail: detail.join(' | ')});
      });
    }

    // 提取骰子行
    const diceLines = text.match(/🎲[^\n]*/g);
    if (diceLines) {
      diceLines.forEach(line => {
        // 跳过已被 DMG 块处理的骰子行
        if (/DMG/i.test(line)) return;
        const m = line.match(/🎲\s*(.+?)\s*检定\s*DC[=＝](\d+)\s*→\s*3d6\s*([+-]\d+)?\s*=\s*(\d+)\s*→\s*(.+)/);
        if (m) {
          items.push({type:'roll', main:`${m[1]} 检定 DC=${m[2]}`, detail:`3d6${m[3]||''} = ${m[4]}`, result:m[5].trim().includes('成功')?'success':'fail'});
          return;
        }
        const s = line.replace('🎲','').trim();
        if (s && s.length > 2) items.push({type:'roll', main:s, detail:'', result:''});
      });
    }

    // CHAR_ADD / LEVEL_UP
    if (text.includes('[CHAR_ADD:') || text.includes('[LEVEL_UP:')) {
      items.push({type:'event', main:text.includes('CHAR_ADD')?'新角色加入队伍':'角色升级', detail:'', result:''});
    }
  });

  if (!items.length) {
    entries.innerHTML = '<div style="text-align:center;padding:24px;color:var(--dim);">暂未检测到骰子或战斗数据——多打几架再来！</div>';
    return;
  }

  const colors = {roll:'var(--gold)',damage:'var(--accent)',event:'var(--good)'};
  entries.innerHTML = items.map((item,i) => `
    <div class="log-entry">
      <span class="log-type ${item.type}">${item.type==='roll'?'🎲 骰子':item.type==='damage'?'⚔️ 伤害':'📌 事件'}</span>
      <span class="log-main">${item.main}</span>
      ${item.detail?`<div class="log-detail">${item.detail}</div>`:''}
    </div>
  `).join('');
}

init();
</script>
